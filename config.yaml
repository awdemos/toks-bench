prompts:
  short:
    messages:
      - role: user
        content: Explain photosynthesis in one paragraph.
  medium:
    messages:
      - role: system
        content: You are a helpful assistant.
      - role: user
        content: |
          Summarize the following article in three bullet points.
          Artificial intelligence has advanced rapidly over the past decade.
          Large language models can now generate coherent text, answer questions,
          and assist with coding tasks. Researchers continue to improve efficiency,
          safety, and alignment so that these systems remain useful and reliable.
  code:
    messages:
      - role: system
        content: You are a helpful coding assistant.
      - role: user
        content: Write a Python function that flattens a nested list of integers.
  long:
    messages:
      - role: system
        content: You are a helpful assistant.
      - role: user
        content: |
          Read the following article and provide a detailed five-paragraph summary
          covering the background, key technical contributions, experimental results,
          limitations, and future directions.

          Large language models have transformed natural language processing over
          the past several years. Starting from transformer architectures and
          scaling laws, researchers discovered that increasing model size and
          training data leads to emergent capabilities such as in-context learning,
          chain-of-thought reasoning, and tool use. These models are now deployed
          in search engines, coding assistants, and conversational agents.

          Key technical contributions include attention mechanisms, pre-training on
          vast unlabeled corpora, alignment through reinforcement learning from human
          feedback, and mixture-of-experts architectures that decouple parameter
          count from active computation. Each advance has brought improvements in
          fluency, factual recall, and instruction following while raising concerns
          about compute cost and energy usage.

          Experimental results show that scaling continues to improve perplexity and
          downstream benchmark performance, though gains are diminishing on some
          reasoning tasks. Smaller models trained longer or with higher-quality data
          can rival larger predecessors, suggesting that data curation and training
          efficiency are as important as raw scale.

          Limitations include hallucinations, bias from training data, difficulty
          with long-horizon planning, and high inference cost. Safety research
          focuses on reducing harmful outputs, improving truthfulness, and enabling
          human oversight. Multimodal extensions add vision and audio understanding
          but introduce new evaluation challenges.

          Future directions include more efficient architectures, better retrieval
          augmentation, improved reasoning with verifiable intermediate steps, and
          autonomous agentic systems. As models become more capable, careful evaluation
          and governance will be essential to ensure broadly beneficial deployment.
  tool:
    messages:
      - role: system
        content: You are a helpful assistant with access to local tools.
      - role: user
        content: |
          Please do the following:
          1. List the files in the current directory.
          2. Read the contents of README.md and summarize it in one sentence.
    tools:
      - type: function
        function:
          name: run_shell
          description: Run a shell command on the local machine. Use this for commands like ls, pwd, cat, etc.
          parameters:
            type: object
            properties:
              command:
                type: string
                description: The shell command to execute.
            required:
              - command
      - type: function
        function:
          name: read_file
          description: Read a file and return its contents as markdown.
          parameters:
            type: object
            properties:
              path:
                type: string
                description: Absolute path to the file to read.
            required:
              - path
